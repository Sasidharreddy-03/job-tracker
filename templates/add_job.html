<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Job | Job Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #F0F4F8;
            min-height: 100vh;
            padding: 24px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }
        .wrapper { width: 100%; max-width: 600px; padding: 20px 0; }
        .header { margin-bottom: 20px; }
        .back { font-size: 13px; color: #2D6A4F; text-decoration: none; font-weight: 500; }
        h1 { font-size: 22px; font-weight: 600; color: #1B4332; margin-top: 8px; }
        .card { background: white; border-radius: 16px; padding: 28px; border: 0.5px solid #D1D5DB; margin-bottom: 12px; }
        .card-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: #2D6A4F; margin-bottom: 12px; }
        label { display: block; font-size: 12px; font-weight: 500; color: #374151; margin-bottom: 5px; }
        input, select, textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #E5E7EB;
            border-radius: 8px;
            font-size: 13px;
            font-family: 'Segoe UI', sans-serif;
            outline: none;
            margin-bottom: 16px;
            transition: border-color 0.2s;
            background: #FAFAFA;
        }
        input:focus, select:focus, textarea:focus { border-color: #2D6A4F; background: white; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .ai-btn {
            width: 100%;
            padding: 11px;
            background: #1B4332;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 4px;
        }
        .ai-btn:hover { background: #0A2E1F; }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #2D6A4F;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        .submit-btn:hover { background: #1B4332; }
        .ai-badge {
            display: inline-block;
            font-size: 11px;
            background: #EAF3DE;
            color: #3B6D11;
            border-radius: 20px;
            padding: 2px 8px;
            margin-left: 6px;
        }
        .loading { display: none; font-size: 12px; color: #6B7280; margin-top: 6px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <a href="/dashboard" class="back">← Back to Dashboard</a>
            <h1>Add New Job</h1>
        </div>

        <!-- AI Extractor Card -->
        <div class="card">
            <div class="card-label">
                Step 1 — AI Auto-fill
                <span class="ai-badge">Gemini AI</span>
            </div>
            <label>Paste Job Description</label>
            <textarea id="job_desc_input" rows="5" placeholder="Paste the full job description here — AI will automatically extract company, role, skills, CTC and location..."></textarea>
            <button type="button" class="ai-btn" onclick="extractDetails()">
                Extract Details with AI →
            </button>
            <div class="loading" id="loading">⏳ AI is extracting details...</div>
        </div>

        <!-- Manual Form Card -->
        <div class="card">
            <div class="card-label">Step 2 — Review and Submit</div>
            <form method="POST">
                <div class="row">
                    <div>
                        <label>Company Name</label>
                        <input type="text" name="company" id="company" placeholder="TCS, Infosys..." required>
                    </div>
                    <div>
                        <label>Role</label>
                        <input type="text" name="role" id="role" placeholder="Python Developer" required>
                    </div>
                </div>

                <div class="row">
                    <div>
                        <label>CTC (LPA)</label>
                        <input type="text" name="ctc" id="ctc" placeholder="3.5 LPA">
                    </div>
                    <div>
                        <label>Location</label>
                        <input type="text" name="location" id="location" placeholder="Hyderabad">
                    </div>
                </div>

                <label>Required Skills</label>
                <input type="text" name="skills" id="skills" placeholder="Python, Flask, SQL, Git">

                <label>Status</label>
                <select name="status">
                    <option value="Applied">Applied</option>
                    <option value="Test">Online Test</option>
                    <option value="Interview">Interview</option>
                    <option value="Offer">Offer</option>
                    <option value="Rejected">Rejected</option>
                </select>

                <label>Notes</label>
                <textarea name="notes" rows="3" placeholder="Any notes about this application..."></textarea>

                <button type="submit" class="submit-btn">Add Job →</button>
            </form>
        </div>
    </div>

    <script>
        async function extractDetails() {
            const jobDesc = document.getElementById('job_desc_input').value;
            if (!jobDesc.trim()) {
                alert('Please paste a job description first!');
                return;
            }

            document.getElementById('loading').style.display = 'block';

            try {
                const response = await fetch('/extract', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ job_description: jobDesc })
                });

                const data = await response.json();

                document.getElementById('company').value = data.company || '';
                document.getElementById('role').value = data.role || '';
                document.getElementById('skills').value = data.skills || '';
                document.getElementById('ctc').value = data.ctc || '';
                document.getElementById('location').value = data.location || '';

            } catch (error) {
                alert('AI extraction failed. Please fill manually.');
            }

            document.getElementById('loading').style.display = 'none';
        }
    </script>
</body>
</html>
