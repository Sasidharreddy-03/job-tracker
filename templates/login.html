<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Job Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #fbf9ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .logo { font-size: 24px; font-weight: 600; color: #2D6A4F; margin-bottom: 6px; }
        .subtitle { font-size: 13px; color: #6B7280; margin-bottom: 28px; }
        label { display: block; font-size: 12px; font-weight: 500; color: #374151; margin-bottom: 5px; }
        input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #E5E7EB;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #010c07; }
        button {
            width: 100%;
            padding: 12px;
            background: #010906;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        button:hover { background: #1B4332; }
        .link { text-align: center; margin-top: 16px; font-size: 13px; color: #6B7280; }
        .link a { color: #2D6A4F; text-decoration: none; font-weight: 500; }
        .flash { background: #FCEBEB; color: #A32D2D; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">📋 Job Tracker</div>
        <div class="subtitle">Welcome back — let's track your progress</div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <label>Email</label>
            <input type="email" name="email" placeholder="you@email.com" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required>

            <button type="submit">Login</button>
        </form>

        <div class="link">Don't have an account? <a href="/register">Register</a></div>
    </div>
</body>
</html>
